<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Test Socket.io - QR Dine</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body>
    <h1>Trang Test Socket.io (Thông báo Admin)</h1>

    <!-- BƯỚC 1: ĐĂNG NHẬP -->
    <div id="login-section">
        <h3>1. Đăng nhập để lấy quyền</h3>
        <input type="email" id="email" placeholder="Email" value="admin@gmail.com">
        <input type="password" id="password" placeholder="Mật khẩu" value="123456">
        <button onclick="login()">Đăng nhập</button>
    </div>

    <hr>

    <!-- BƯỚC 2: TRẠNG THÁI KẾT NỐI -->
    <div>
        <h3>2. Trạng thái: <span id="status" style="color: red;">Chưa kết nối</span></h3>
        <p>User: <b id="user-info">Chưa có</b> | Role: <b id="role-info">-</b></p>
    </div>

    <hr>

    <!-- BƯỚC 3: DANH SÁCH THÔNG BÁO -->
    <div>
        <h3>3. Danh sách thông báo (Live):</h3>
        <ul id="notifications" style="background: #f0f0f0; padding: 20px; min-height: 100px; border: 1px solid #ccc;">
            <li>Đang chờ thông báo...</li>
        </ul>
    </div>

    <script>
        let socket;
        const API_URL = "http://localhost:3000";

        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch(`${API_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (data.success) {
                    document.getElementById('user-info').innerText = data.user.name;
                    document.getElementById('role-info').innerText = data.user.role;
                    document.getElementById('login-section').style.display = 'none';
                    
                    // Sau khi login xong thì kết nối Socket
                    initSocket(data.user.role);
                } else {
                    alert("Đăng nhập thất bại: " + data.error);
                }
            } catch (error) {
                console.error("Lỗi login:", error);
                alert("Không thể kết nối tới Server!");
            }
        }

        function initSocket(role) {
            socket = io(API_URL);

            socket.on('connect', () => {
                document.getElementById('status').innerText = "Đã kết nối ✅";
                document.getElementById('status').style.color = "green";

                // QUAN TRỌNG: Join phòng admin_hub
                console.log("Đang join phòng với role:", role);
                socket.emit('setup_user', role);
            });

            socket.on('disconnect', () => {
                document.getElementById('status').innerText = "Mất kết nối ❌";
                document.getElementById('status').style.color = "red";
            });

            // Lắng nghe sự kiện thông báo mới
            socket.on('new_notification', (notif) => {
                console.log("Nhận thông báo:", notif);
                const list = document.getElementById('notifications');
                const li = document.createElement('li');
                li.innerHTML = `<b>${notif.title}</b>: ${notif.message} <br> <small>${new Date(notif.createdAt).toLocaleTimeString()}</small><hr>`;
                list.prepend(li); // Thêm lên đầu

                // Phát âm thanh đơn giản
                const audio = new Audio('https://www.soundjay.com/buttons/sounds/button-3.mp3');
                audio.play().catch(() => {});
            });

            // Lắng nghe trực tiếp sự kiện Order mới
            socket.on('new-order', (order) => {
                console.log("Có Order mới:", order);
            });
        }
    </script>
</body>
</html>
